apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-serve
  labels:
    app.kubernetes.io/name: go-serve
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-serve
  labels:
    app.kubernetes.io/name: go-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: go-serve
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-serve
    spec:
      serviceAccountName: go-serve
      containers:
      - name: go-serve
        image: ghcr.io/appscodeci/go-serve:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        args:
        - run
        - --port
        - "9443"
        ports:
        - name: https
          containerPort: 9443
        readinessProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: go-serve
  labels:
    app.kubernetes.io/name: go-serve
spec:
  selector:
    app.kubernetes.io/name: go-serve
  ports:
  - name: https
    port: 9443
    targetPort: https
